<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to bottom, #092338 0%, #0f3e61 50%, #1c7293 100%);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 25vh;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.34,201.2,109.81,241.6,104.33,281.42,88.75,321.39,56.44Z" fill="%2360a5fa" fill-opacity="0.15"/></svg>');
            background-size: 50% 100%;
            animation: wave 15s linear infinite;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 18vh;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M985.66,92.83C906.67,72,823.78,31,743.84,14.19c-82.26-17.34-168.06-16.33-250.45.39-57.84,11.73-114,31.07-172,41.86A600.21,600.21,0,0,1,0,27.35V120H1200V95.8C1132.19,118.92,1055.71,111.31,985.66,92.83Z" fill="%2338bdf8" fill-opacity="0.25"/></svg>');
            background-size: 50% 100%;
            animation: wave 10s linear infinite reverse;
            z-index: -1;
        }

        @keyframes wave {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 加入深海藍與湖水綠漸層 */
            background: radial-gradient(circle at center, #153c5e 0%, rgba(9, 35, 56, 0.8) 100%);
            z-index: 9999;
            color: white;
            /* 讓讀取畫面消失時有平滑的淡出效果 */
            transition: opacity 0.5s ease-out;
        }

        /* 現代感雙環發光旋轉器 */
        .loader-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
            margin-bottom: 35px;
        }

        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #38bdf8;
            /* 海藍色 */
            border-right-color: #38bdf8;
            animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            /* 發光效果 */
        }

        .spinner-ring:nth-child(2) {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-top-color: #67e8f9;
            /* 湖水綠 */
            border-right-color: transparent;
            border-left-color: #67e8f9;
            animation: spin-reverse 1.2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(103, 232, 249, 0.4);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            0% {
                transform: rotate(360deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        /* 標題與副標題動畫 */
        .title {
            font-size: 1.4rem;
            letter-spacing: 0.4em;
            /* 增加字距更顯大氣 */
            font-weight: 800;
            margin-bottom: 12px;
            /* 水波光澤漸層字 */
            background: linear-gradient(to right, #ffffff, #67e8f9, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-text 3s ease-in-out infinite;
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            letter-spacing: 0.1em;
            animation: fade-up 1s ease-out;
        }

        @keyframes pulse-text {

            0%,
            100% {
                opacity: 0.8;
                filter: drop-shadow(0 0 2px rgba(147, 197, 253, 0));
            }

            50% {
                opacity: 1;
                filter: drop-shadow(0 0 8px rgba(147, 197, 253, 0.6));
            }
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 0.7;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="loader-wrapper">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
        </div>
        <div class="title">NTNU CAMPING CLUB</div>
    </div>

    <iframe id="content-frame" style="width: 100%; height: 100vh; border: none; display: none;"></iframe>

    <script>
        window.onload = function () {
            // 1. 判斷裝置
            var mode = (window.innerWidth > 1000) ? 'pc' : 'mobile';
            console.log("偵測到模式:", mode);

            // 2. 決定要讀取的檔案名稱
            var targetPage = (mode === 'pc') ? 'information.html' : 'information_phone.html';

            // 3. 使用 iframe 載入以避免 Tailwind 重複載入的效能問題
            var frame = document.getElementById('content-frame');
            frame.src = targetPage;

            frame.onload = function () {
                frame.style.display = 'block';
                var loadingScreen = document.getElementById('loading-screen');
                loadingScreen.style.opacity = '0';
                setTimeout(function () {
                    loadingScreen.style.display = 'none';
                }, 500);
            };
        };
    </script>
</body>

</html>
